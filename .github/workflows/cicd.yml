name: CICD
on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Clone to code
        run: echo "Cloning the code"
    
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build to code
        run: echo "Building the code"
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test to code
        run: echo "Testing the code"
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to code
        run: echo "Deploying the code"
